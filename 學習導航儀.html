<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>學習導航儀 — 進度評估與內容規劃</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
    --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
    --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
    --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe;
    --blue-400: #60a5fa; --blue-500: #3b82f6; --blue-600: #2563eb; --blue-700: #1d4ed8;
    --indigo-400: #818cf8; --indigo-500: #6366f1;
    --amber-400: #fbbf24; --amber-500: #f59e0b;
    --rose-400: #fb7185; --rose-500: #f43f5e;
    --emerald-400: #34d399; --emerald-500: #10b981; --emerald-600: #059669;
    --card-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --card-shadow-lg: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--slate-50);
    color: var(--slate-800);
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 {
    font-size: 2.2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--blue-600), var(--indigo-500));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--slate-500); font-size: 1rem; margin-top: 0.4rem; font-weight: 400; }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 1rem 0.8rem;
    text-align: center;
    box-shadow: var(--card-shadow);
    border: 1px solid var(--slate-100);
  }
  .stat-card .value {
    font-size: 1.6rem; font-weight: 800;
    line-height: 1.2;
  }
  .stat-card .label {
    font-size: 0.72rem; color: var(--slate-400);
    margin-top: 0.15rem; font-weight: 500;
  }
  .stat-hours .value { color: var(--blue-600); }
  .stat-tasks .value { color: var(--indigo-500); }
  .stat-mastery .value { color: var(--emerald-500); }
  .stat-streak .value { color: var(--amber-500); }

  /* Grid Layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: white;
    border-radius: 20px;
    padding: 1.5rem 1.5rem;
    box-shadow: var(--card-shadow);
    border: 1px solid var(--slate-100);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .card-header h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--slate-800);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .card-header h2 .icon { font-size: 1.1rem; }

  /* Section divider */
  .section-divider {
    border: none;
    border-top: 1px solid var(--slate-100);
    margin: 1rem 0;
  }

  /* Form Elements */
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .input-row input, .input-row select {
    flex: 1;
    padding: 0.5rem 0.8rem;
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    background: white;
    transition: border-color 0.2s;
  }
  .input-row input:focus, .input-row select:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(59,130,246,.12);
  }

  .btn {
    padding: 0.45rem 1.1rem;
    border: none;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue-500); color: white; }
  .btn-primary:hover { background: var(--blue-600); }
  .btn-outline { background: transparent; border: 1.5px solid var(--slate-200); color: var(--slate-600); }
  .btn-outline:hover { border-color: var(--blue-400); color: var(--blue-600); background: var(--blue-50); }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.72rem; }
  .btn-danger { background: var(--rose-500); color: white; }
  .btn-danger:hover { background: #e11d48; }

  /* Progress Bars */
  .progress-group { margin-bottom: 0.8rem; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    margin-bottom: 0.25rem;
    color: var(--slate-600);
  }
  .progress-label .name { font-weight: 500; }
  .progress-label .pct { color: var(--slate-400); font-weight: 600; }
  .progress-track {
    height: 8px;
    background: var(--slate-100);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  /* Task List */
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.7rem;
    background: var(--slate-50);
    border-radius: 10px;
    margin-bottom: 0.4rem;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .task-item:hover { border-color: var(--blue-200); }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--slate-400); }

  .task-check {
    width: 18px; height: 18px;
    accent-color: var(--blue-500);
    cursor: pointer;
    flex-shrink: 0;
  }
  .task-text { flex: 1; font-size: 0.85rem; color: var(--slate-700); }
  .task-del {
    background: none;
    border: none;
    color: var(--slate-300);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.2rem;
    opacity: 0;
    transition: all 0.15s;
  }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--rose-500); }

  /* Mastery Slider */
  .mastery-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.5rem;
  }
  .mastery-row label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--slate-600);
    min-width: 60px;
  }
  .mastery-row input[type=range] {
    flex: 1;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--slate-200);
    border-radius: 999px;
    outline: none;
  }
  .mastery-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--blue-500);
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .mastery-row .score {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--blue-600);
    min-width: 30px;
    text-align: right;
  }

  /* Error Notes */
  .error-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.5rem 0.6rem;
    background: #fff1f2;
    border-radius: 10px;
    margin-bottom: 0.4rem;
    border: 1px solid #ffe4e6;
  }
  .error-item .err-icon { font-size: 0.9rem; margin-top: 0.1rem; }
  .error-item .err-text { flex: 1; font-size: 0.8rem; color: var(--slate-700); }
  .error-item .err-text .err-title { font-weight: 600; }
  .error-item .err-text .err-meta { font-size: 0.72rem; color: var(--slate-400); margin-top: 0.1rem; }

  /* Goals */
  .goal-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.6rem;
    background: var(--blue-50);
    border-radius: 10px;
    margin-bottom: 0.4rem;
    border: 1px solid var(--blue-100);
  }
  .goal-item .goal-icon { font-size: 0.9rem; }
  .goal-item .goal-text { flex: 1; font-size: 0.82rem; color: var(--slate-700); }
  .goal-item .goal-text .goal-label { font-weight: 600; }
  .goal-item .goal-text .goal-meta { font-size: 0.72rem; color: var(--slate-400); }

  /* Resource Library */
  .resource-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.6rem;
    background: white;
    border-radius: 10px;
    margin-bottom: 0.35rem;
    border: 1px solid var(--slate-100);
  }
  .resource-item .res-icon { font-size: 0.85rem; }
  .resource-item .res-text { flex: 1; font-size: 0.8rem; color: var(--slate-700); }
  .resource-item .res-text .res-title { font-weight: 500; }
  .resource-item .res-text .res-meta { font-size: 0.7rem; color: var(--slate-400); }

  /* Radar Chart placeholder */
  .chart-placeholder {
    width: 100%; height: 180px;
    background: var(--slate-50);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--slate-300);
    font-size: 0.85rem;
    border: 1px dashed var(--slate-200);
    margin-bottom: 0.8rem;
    position: relative;
    overflow: hidden;
  }
  .chart-placeholder canvas { max-width: 100%; max-height: 100%; }

  /* Badges */
  .badge-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-earned { background: #fef3c7; color: #92400e; }
  .badge-locked { background: var(--slate-100); color: var(--slate-400); }

  /* Efficiency */
  .efficiency-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--slate-100);
  }
  .efficiency-row:last-child { border-bottom: none; }
  .efficiency-row .ef-label { flex: 1; font-size: 0.8rem; color: var(--slate-600); }
  .efficiency-row .ef-bar {
    width: 120px; height: 8px;
    background: var(--slate-100);
    border-radius: 999px;
    overflow: hidden;
  }
  .efficiency-row .ef-bar .ef-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s;
  }
  .efficiency-row .ef-value { font-size: 0.8rem; font-weight: 600; color: var(--slate-700); min-width: 35px; text-align: right; }

  /* Tip Box */
  .tip-box {
    background: var(--blue-50);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    margin-top: 1rem;
    border: 1px solid var(--blue-100);
    font-size: 0.8rem;
    color: var(--slate-600);
    line-height: 1.6;
  }
  .tip-box strong { color: var(--blue-700); }

  .footer {
    text-align: center;
    margin-top: 2.5rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--slate-100);
    color: var(--slate-400);
    font-size: 0.75rem;
    font-weight: 400;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--slate-800);
    color: white;
    padding: 0.6rem 1.3rem;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 500;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty-hint { font-size: 0.78rem; color: var(--slate-400); text-align: center; padding: 0.8rem 0; }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    body { padding: 1rem 0.6rem; }
    .header h1 { font-size: 1.6rem; }
    .header p { font-size: 0.85rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .stat-card { padding: 0.7rem 0.5rem; }
    .stat-card .value { font-size: 1.3rem; }
    .card { padding: 1rem 1rem; border-radius: 16px; }
    .card-header { margin-bottom: 0.8rem; }
    .card-header h2 { font-size: 0.95rem; }
    .input-row { flex-wrap: wrap; }
    .input-row input { min-width: 0; }
    .input-row .btn { width: 100%; justify-content: center; }
    .efficiency-row .ef-bar { width: 80px; }
    .btn { font-size: 0.75rem; padding: 0.4rem 0.9rem; }
    .task-item { padding: 0.45rem 0.55rem; }
    .task-text { font-size: 0.8rem; }
    .task-del { opacity: 1; }
  }

  @media (max-width: 380px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stat-card .value { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <h1>📘 學習導航儀</h1>
    <p>評估當前進度 · 規劃下一步行動</p>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card stat-hours">
      <div class="value" id="statHours">0</div>
      <div class="label">📚 學習時長（h）</div>
    </div>
    <div class="stat-card stat-tasks">
      <div class="value" id="statTasks">0/0</div>
      <div class="label">✅ 已完成任務</div>
    </div>
    <div class="stat-card stat-mastery">
      <div class="value" id="statMastery">0%</div>
      <div class="label">🎯 掌握度</div>
    </div>
    <div class="stat-card stat-streak">
      <div class="value" id="statStreak">0</div>
      <div class="label">🔥 連續學習天數</div>
    </div>
  </div>

  <div class="grid">

    <!-- ===== LEFT: 進度評估 ===== -->
    <div>

      <!-- 學習時長 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">⏱️</span> 學習時長</h2>
          <div class="input-row" style="margin:0;">
            <input type="number" id="hourInput" placeholder="0" min="0" step="0.5" style="width:70px;flex:none;">
            <select id="hourPeriod">
              <option value="day">今日</option>
              <option value="week" selected>本週</option>
              <option value="month">本月</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="addHours()">＋記錄</button>
            <button class="btn btn-outline btn-sm" onclick="resetHours()">↺</button>
          </div>
        </div>
        <div class="progress-group">
          <div class="progress-label">
            <span class="name">📅 本週目標（10h）</span>
            <span class="pct" id="weekHoursText">0h / 10h</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="weekHoursFill" style="width:0%;background:linear-gradient(90deg,var(--blue-400),var(--blue-600));"></div>
          </div>
        </div>
        <div class="progress-group">
          <div class="progress-label">
            <span class="name">📅 本月目標（40h）</span>
            <span class="pct" id="monthHoursText">0h / 40h</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="monthHoursFill" style="width:0%;background:linear-gradient(90deg,var(--indigo-400),var(--indigo-500));"></div>
          </div>
        </div>
      </div>

      <!-- 完成度 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">📊</span> 課程完成度</h2>
          <button class="btn btn-outline btn-sm" onclick="addCourse()">＋ 新增課程</button>
        </div>
        <div id="courseList"></div>
      </div>

      <!-- 掌握度自評 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">⭐</span> 掌握度自評</h2>
        </div>
        <div id="masteryList"></div>
      </div>

      <!-- 錯題記錄 -->
      <div class="card">
        <div class="card-header">
          <h2><span class="icon">📝</span> 錯題 / 重難點</h2>
          <button class="btn btn-outline btn-sm" onclick="addErrorNote()">＋ 記錄</button>
        </div>
        <div id="errorList"></div>
      </div>

    </div>

    <!-- ===== RIGHT: 內容規劃 ===== -->

    <div>

      <!-- 今日任務 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">🗓️</span> 今日任務</h2>
          <div style="display:flex;gap:0.3rem;">
            <button class="btn btn-outline btn-sm" onclick="clearCompleted()">清除已完成</button>
          </div>
        </div>
        <div class="input-row">
          <input type="text" id="taskInput" placeholder="添加新任務..." onkeydown="if(event.key==='Enter')addTask()">
          <button class="btn btn-primary btn-sm" onclick="addTask()">＋ 添加</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
      </div>

      <!-- 學習目標 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">🎯</span> 學習目標</h2>
          <button class="btn btn-outline btn-sm" onclick="addGoal()">＋ 設定</button>
        </div>
        <div id="goalList"></div>
      </div>

      <!-- 資源庫 -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-header">
          <h2><span class="icon">📚</span> 資源庫</h2>
          <button class="btn btn-outline btn-sm" onclick="addResource()">＋ 添加</button>
        </div>
        <div id="resourceList"></div>
      </div>

      <!-- 效率分析 + 成就 -->
      <div class="card">
        <div class="card-header">
          <h2><span class="icon">📈</span> 效率分析</h2>
        </div>
        <div id="efficiencyList"></div>

        <hr class="section-divider">

        <div class="card-header" style="margin-bottom:0.5rem;">
          <h2><span class="icon">🏆</span> 成就徽章</h2>
        </div>
        <div class="badge-grid" id="badgeGrid"></div>

        <div class="tip-box" id="tipBox">
          💡 <strong>今日建議：</strong> 完成至少一項任務，保持學習連續性。
        </div>
      </div>

    </div>
  </div>

  <!-- Data Management Bar -->
  <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-top:1.5rem;padding:1rem 0;border-top:1px solid var(--slate-100);">
    <button class="btn btn-outline btn-sm" onclick="exportData()">📤 導出備份</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📥 導入備份</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-outline btn-sm" onclick="showDataStatus()">📊 存儲狀態</button>
    <button class="btn btn-outline btn-sm" onclick="resetAllData()" style="color:var(--rose-500);border-color:var(--rose-200);">🔄 重置數據</button>
  </div>

  <div class="footer">
    數據自動保存至本地 · 每日學習記錄可持續追蹤
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STORAGE
// ============================================================
const STORAGE_KEY = 'study_navigator_v1';

const DEFAULT = {
  hoursTotal: 0,
  weekHours: 0,
  monthHours: 0,
  courses: [
    { name: '數學', progress: 45 },
    { name: '英語', progress: 70 },
    { name: '專業課', progress: 25 },
  ],
  masteries: [
    { name: '數學', score: 3 },
    { name: '英語', score: 4 },
    { name: '專業課', score: 2 },
  ],
  tasks: [
    { text: '複習數學第三章筆記', done: false },
    { text: '完成英語閱讀練習x3', done: false },
    { text: '預習專業課第4章', done: true },
  ],
  goals: [
    { text: '通過期末考試', type: '長期', deadline: '2026-12' },
    { text: '完成所有作業', type: '短期', deadline: '2026-06' },
  ],
  resources: [
    { title: '數學公式大全', type: '筆記', url: 'https://example.com/math' },
    { title: '英語聽力訓練', type: '視頻', url: 'https://example.com/english' },
  ],
  errors: [
    { title: '微分方程求解', subject: '數學', date: '2026-05-20' },
  ],
  efficiencies: [
    { label: '週一', pct: 75 },
    { label: '週二', pct: 60 },
    { label: '週三', pct: 85 },
    { label: '週四', pct: 50 },
    { label: '週五', pct: 70 },
    { label: '週六', pct: 40 },
    { label: '週日', pct: 0 },
  ],
  streak: 0,
  lastDate: '',
};

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      if (d && d.hoursTotal !== undefined) {
        return mergeDefaults(d);
      }
    } catch(e) {
      console.warn('數據加載錯誤，使用默認值');
    }
  }
  saveData(DEFAULT);
  return JSON.parse(JSON.stringify(DEFAULT));
}

function mergeDefaults(data) {
  function deepMerge(t, s) {
    const r = { ...t };
    for (const k in s) {
      if (s.hasOwnProperty(k)) {
        if (k in t) {
          if (typeof s[k] === 'object' && !Array.isArray(s[k]) && s[k] !== null)
            r[k] = deepMerge(t[k] || {}, s[k]);
          else r[k] = t[k];
        } else r[k] = JSON.parse(JSON.stringify(s[k]));
      }
    }
    return r;
  }
  return deepMerge(data, DEFAULT);
}

function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

let DATA = loadData();

// ============================================================
// HELPERS
// ============================================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

$(function(){
  // Empty init
});

// ============================================================
// STATS
// ============================================================
function updateStats() {
  document.getElementById('statHours').textContent = (DATA.hoursTotal || 0).toFixed(1);
  const total = (DATA.tasks || []).length;
  const done = (DATA.tasks || []).filter(t => t.done).length;
  document.getElementById('statTasks').textContent = `${done}/${total}`;

  const scores = (DATA.masteries || []).map(m => m.score);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0) / scores.length * 20) : 0;
  document.getElementById('statMastery').textContent = avg + '%';

  updateStreak();
  document.getElementById('statStreak').textContent = DATA.streak || 0;
}

function updateStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (DATA.lastDate !== today && DATA.lastDate) {
    const last = new Date(DATA.lastDate);
    const diff = (new Date(today) - last) / 86400000;
    if (diff > 1) DATA.streak = 0;
    else if (diff === 1) DATA.streak = (DATA.streak || 0) + 1;
  }
  DATA.lastDate = today;
}

// ============================================================
// HOURS
// ============================================================
function addHours() {
  const h = parseFloat(document.getElementById('hourInput').value);
  if (!h || h <= 0) { showToast('請輸入有效時長'); return; }
  DATA.hoursTotal = (DATA.hoursTotal || 0) + h;
  DATA.weekHours = (DATA.weekHours || 0) + h;
  DATA.monthHours = (DATA.monthHours || 0) + h;
  document.getElementById('hourInput').value = '';
  saveData(DATA);
  renderAll();
  showToast(`⏱️ 已記錄 ${h} 小時`);
}

function resetHours() {
  if (!confirm('重置本週/本月時長（不影響總時長）？')) return;
  DATA.weekHours = 0;
  DATA.monthHours = 0;
  saveData(DATA);
  renderAll();
  showToast('↺ 已重置週/月時長');
}

// ============================================================
// COURSES
// ============================================================
function addCourse() {
  const name = prompt('課程名稱：');
  if (!name || !name.trim()) return;
  DATA.courses = DATA.courses || [];
  DATA.courses.push({ name: name.trim(), progress: 0 });
  saveData(DATA);
  renderAll();
}

function updateCourseProgress(idx, val) {
  DATA.courses[idx].progress = Math.min(100, Math.max(0, parseInt(val) || 0));
  saveData(DATA);
  renderAll();
}

function deleteCourse(idx) {
  if (!confirm(`刪除「${DATA.courses[idx].name}」？`)) return;
  DATA.courses.splice(idx, 1);
  saveData(DATA);
  renderAll();
}

// ============================================================
// MASTERY
// ============================================================
function updateMastery(idx, val) {
  DATA.masteries[idx].score = parseInt(val);
  saveData(DATA);
  renderAll();
}

// ============================================================
// ERRORS
// ============================================================
function addErrorNote() {
  const title = prompt('錯題/重難點名稱：');
  if (!title || !title.trim()) return;
  const subject = prompt('所屬科目：') || '未分類';
  DATA.errors = DATA.errors || [];
  DATA.errors.push({ title: title.trim(), subject, date: new Date().toISOString().slice(0,10) });
  saveData(DATA);
  renderAll();
  showToast('📝 已記錄');
}

function deleteError(idx) {
  DATA.errors.splice(idx, 1);
  saveData(DATA);
  renderAll();
}

// ============================================================
// TASKS
// ============================================================
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) { showToast('請輸入任務'); return; }
  DATA.tasks = DATA.tasks || [];
  DATA.tasks.push({ text, done: false });
  input.value = '';
  saveData(DATA);
  renderAll();
  showToast('✅ 已添加任務');
}

function toggleTask(idx) {
  DATA.tasks[idx].done = !DATA.tasks[idx].done;
  saveData(DATA);
  renderAll();
}

function deleteTask(idx) {
  DATA.tasks.splice(idx, 1);
  saveData(DATA);
  renderAll();
}

function clearCompleted() {
  DATA.tasks = (DATA.tasks || []).filter(t => !t.done);
  saveData(DATA);
  renderAll();
  showToast('🧹 已清除已完成任務');
}

// ============================================================
// GOALS
// ============================================================

  const text = prompt('學習目標：');
  if (!text || !text.trim()) return;
  const type = confirm('點「確定」為長期，點「取消」為短期') ? '長期' : '短期';
  DATA.goals = DATA.goals || [];
  DATA.goals.push({ text: text.trim(), type, deadline: '' });
  saveData(DATA);
  renderAll();
}

function deleteGoal(idx) {
  DATA.goals.splice(idx, 1);
  saveData(DATA);
  renderAll();
}

// ============================================================
// RESOURCES
// ============================================================
function addResource() {
  const title = prompt('資源名稱：');
  if (!title || !title.trim()) return;
  const type = prompt('類型（筆記/視頻/連結）：') || '連結';
  DATA.resources = DATA.resources || [];
  DATA.resources.push({ title: title.trim(), type, url: '#' });
  saveData(DATA);
  renderAll();
}

function deleteResource(idx) {
  DATA.resources.splice(idx, 1);
  saveData(DATA);
  renderAll();
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  updateStats();

  // Hours
  const weekTarget = 10, monthTarget = 40;
  const wh = DATA.weekHours || 0, mh = DATA.monthHours || 0;
  document.getElementById('weekHoursText').textContent = `${wh.toFixed(1)}h / ${weekTarget}h`;
  document.getElementById('weekHoursFill').style.width = Math.min(100, wh/weekTarget*100) + '%';
  document.getElementById('monthHoursText').textContent = `${mh.toFixed(1)}h / ${monthTarget}h`;
  document.getElementById('monthHoursFill').style.width = Math.min(100, mh/monthTarget*100) + '%';

  // Courses
  const cl = document.getElementById('courseList');
  cl.innerHTML = '';
  (DATA.courses||[]).forEach((c, i) => {
    const colors = [
      'linear-gradient(90deg,var(--blue-400),var(--blue-600))',
      'linear-gradient(90deg,var(--indigo-400),var(--indigo-500))',
      'linear-gradient(90deg,var(--emerald-400),var(--emerald-500))',
      'linear-gradient(90deg,#f59e0b,#f97316)',
      'linear-gradient(90deg,var(--rose-400),var(--rose-500))',
    ];
    const grad = colors[i % colors.length];
    cl.innerHTML += `<div class="progress-group">
      <div class="progress-label">
        <span class="name">${c.name}</span>
        <span class="pct">${c.progress}% <span class="task-del" onclick="deleteCourse(${i})" style="opacity:0.4;cursor:pointer;">✕</span></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${c.progress}%;background:${grad};"></div>
      </div>
      <div style="margin-top:0.2rem;">
        <input type="range" min="0" max="100" value="${c.progress}" oninput="updateCourseProgress(${i},this.value)" style="width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--slate-200);border-radius:999px;outline:none;">
      </div>
    </div>`;
  });
  if (!DATA.courses||!DATA.courses.length) cl.innerHTML = '<div class="empty-hint">暫無課程，點擊上方「＋新增課程」</div>';

  // Masteries
  const ml = document.getElementById('masteryList');
  ml.innerHTML = '';
  const stars = n => '⭐'.repeat(n) + '☆'.repeat(5-n);
  (DATA.masteries||[]).forEach((m, i) => {
    ml.innerHTML += `<div class="mastery-row">
      <label>${m.name}</label>
      <input type="range" min="1" max="5" value="${m.score}" oninput="updateMastery(${i},this.value)">
      <span class="score">${stars(m.score)}</span>
    </div>`;
  });

  // Errors
  const el = document.getElementById('errorList');
  el.innerHTML = '';
  (DATA.errors||[]).forEach((e, i) => {
    el.innerHTML += `<div class="error-item">
      <span class="err-icon">❌</span>
      <div class="err-text">
        <div class="err-title">${e.title}</div>
        <div class="err-meta">${e.subject} · ${e.date}</div>
      </div>
      <button class="task-del" onclick="deleteError(${i})" style="opacity:1;">✕</button>
    </div>`;
  });
  if (!DATA.errors||!DATA.errors.length) el.innerHTML = '<div class="empty-hint">暫無錯題記錄</div>';

  // Tasks
  const tl = document.getElementById('taskList');
  tl.innerHTML = '';
  (DATA.tasks||[]).forEach((t, i) => {
    tl.innerHTML += `<li class="task-item ${t.done?'done':''}">
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask(${i})">
      <span class="task-text">${t.text}</span>
      <button class="task-del" onclick="deleteTask(${i})">✕</button>
    </li>`;
  });
  if (!DATA.tasks||!DATA.tasks.length) tl.innerHTML = '<div class="empty-hint">暫無任務，在上方輸入添加</div>';

  // Goals
  const gl = document.getElementById('goalList');
  gl.innerHTML = '';
  (DATA.goals||[]).forEach((g, i) => {
    gl.innerHTML += `<div class="goal-item">
      <span class="goal-icon">${g.type==='長期'?'🎯':'🏃'}</span>
      <div class="goal-text">
        <span class="goal-label">${g.text}</span>
        <span class="goal-meta"> · ${g.type}</span>
      </div>
      <button class="task-del" onclick="deleteGoal(${i})">✕</button>
    </div>`;
  });
  if (!DATA.goals||!DATA.goals.length) gl.innerHTML = '<div class="empty-hint">暫無目標，點擊上方「＋設定」</div>';

  // Resources
  const rl = document.getElementById('resourceList');
  rl.innerHTML = '';
  const typeIcons = { '筆記':'📝', '視頻':'🎬', '連結':'🔗' };
  (DATA.resources||[]).forEach((r, i) => {
    rl.innerHTML += `<div class="resource-item">
      <span class="res-icon">${typeIcons[r.type]||'📄'}</span>
      <div class="res-text">
        <span class="res-title">${r.title}</span>
        <span class="res-meta"> · ${r.type}</span>
      </div>
      <button class="task-del" onclick="deleteResource(${i})">✕</button>
    </div>`;
  });
  if (!DATA.resources||!DATA.resources.length) rl.innerHTML = '<div class="empty-hint">暫無資源</div>';

  // Efficiency
  const efl = document.getElementById('efficiencyList');
  efl.innerHTML = '';
  (DATA.efficiencies||[]).forEach(ef => {
    const color = ef.pct >= 70 ? 'var(--emerald-500)' : ef.pct >= 40 ? 'var(--amber-500)' : 'var(--rose-400)';
    efl.innerHTML += `<div class="efficiency-row">
      <span class="ef-label">${ef.label}</span>
      <div class="ef-bar"><div class="ef-fill" style="width:${ef.pct}%;background:${color};"></div></div>
      <span class="ef-value">${ef.pct}%</span>
    </div>`;
  });

  // Badges
  const bg = document.getElementById('badgeGrid');
  const badges = [
    { name: '初學者', icon: '🌱', earned: true },
    { name: '連續3天', icon: '🔥', earned: (DATA.streak||0) >= 3 },
    { name: '10任務', icon: '✅', earned: (DATA.tasks||[]).filter(t=>t.done).length >= 10 },
    { name: '20小時', icon: '⏱️', earned: (DATA.hoursTotal||0) >= 20 },
    { name: '全科目', icon: '🎓', earned: (DATA.masteries||[]).every(m=>m.score>=4) && DATA.masteries.length >= 3 },
    { name: '完美一週', icon: '💎', earned: (DATA.efficiencies||[]).filter(e=>e.pct>=70).length >= 5 },
  ];
  bg.innerHTML = badges.map(b =>
    `<span class="badge ${b.earned?'badge-earned':'badge-locked'}">${b.icon} ${b.name}</span>`
  ).join('');

  // Tip
  const tip = document.getElementById('tipBox');
  const undone = (DATA.tasks||[]).filter(t=>!t.done).length;
  if (undone === 0 && (DATA.tasks||[]).length > 0) {
    tip.innerHTML = '🎉 <strong>太棒了！</strong> 所有任務已完成，給自己一個獎勵吧！';
  } else if ((DATA.streak||0) >= 3) {
    tip.innerHTML = `🔥 <strong>連續${DATA.streak}天學習！</strong> 保持這個節奏，離目標越來越近。`;
  } else if ((DATA.hoursTotal||0) < 2) {
    tip.innerHTML = '💡 <strong>今日建議：</strong> 先完成一項小任務，建立學習 momentum。';
  } else {
    tip.innerHTML = `💡 <strong>今日建議：</strong> 還有 ${undone} 項任務待完成，先從最難的開始。`;
  }

  saveData(DATA);
}

// ============================================================
// 數據導出 / 導入 / 管理
// ============================================================

function exportData() {
  const data = loadData();
  const exportObj = { version: '1.0', exportDate: new Date().toISOString(), appName: '學習導航儀', data };
  const jsonStr = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `學習導航儀備份_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  localStorage.setItem('study_navigator_last_backup', new Date().toISOString().slice(0,10));
  showToast('📤 備份已下載');
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.data || imported.data.hoursTotal === undefined) {
        showToast('❌ 文件格式不正確'); return;
      }
      const info = `📋 導入預覽：\n• 課程 ${imported.data.courses?.length||0} 門\n• 任務 ${imported.data.tasks?.length||0} 項\n• 錯題 ${imported.data.errors?.length||0} 條\n• 時長 ${(imported.data.hoursTotal||0).toFixed(1)}h\n\n⚠️ 將覆蓋當前所有數據！`;
      if (confirm(info)) {
        saveData(imported.data);
        DATA = imported.data;
        renderAll();
        showToast('✅ 導入成功');
      }
    } catch(_) { showToast('❌ 文件解析失敗'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAllData() {
  if (!confirm('⚠️ 確定重置所有數據？此操作無法恢復！')) return;
  if (!confirm('再次確認：所有數據將被清空！')) return;
  localStorage.removeItem(STORAGE_KEY);
  DATA = JSON.parse(JSON.stringify(DEFAULT));
  saveData(DATA); renderAll();
  showToast('🔄 數據已重置');
}

function showDataStatus() {
  const size = new Blob([JSON.stringify(DATA)]).size;
  let totalSize = 0;
  for (let k in localStorage) { if (localStorage.hasOwnProperty(k)) totalSize += localStorage[k].length; }
  alert(`📊 存儲狀態\n• 數據大小：${(size/1024).toFixed(2)} KB\n• 瀏覽器使用：${(totalSize/(5*1024*1024)*100).toFixed(1)}%\n• 課程 ${DATA.courses?.length||0} 門\n• 任務 ${DATA.tasks?.length||0} 項\n• 錯題 ${DATA.errors?.length||0} 條\n• 目標 ${DATA.goals?.length||0} 個\n• 資源 ${DATA.resources?.length||0} 個`);
}

function checkBackupReminder() {
  const KEY = 'study_navigator_last_backup';
  const last = localStorage.getItem(KEY);
  const today = new Date().toISOString().slice(0,10);
  if (!last) { localStorage.setItem(KEY, today); return; }
  const days = Math.floor((new Date(today) - new Date(last)) / 86400000);
  if (days >= 7) {
    if (confirm(`📤 已 ${days} 天未備份！建議定期備份。立即導出？`)) {
      exportData();
    } else {
      localStorage.setItem(KEY, new Date(Date.now() - 4*86400000).toISOString().slice(0,10));
    }
  }
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  checkBackupReminder();
});
